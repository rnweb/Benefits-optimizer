# =============================================
# SPO - CI/CD Pipeline for Supabase Edge Functions
# =============================================

name: SPO Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  pull_request:
    branches: [main]
    paths:
      - 'supabase/functions/**'

env:
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

jobs:
  # 1. Type Check
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run typecheck

  # 2. Lint
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run lint || true

  # 3. Deploy Edge Functions
  deploy:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase Project
        run: supabase link --project-ref $SUPABASE_PROJECT_REF

      - name: Deploy Functions
        run: |
          supabase functions deploy calculate-erc
          supabase functions deploy get-best-deals
          supabase functions deploy watchlist
          supabase functions deploy wallet

      - name: Verify Deployment
        run: |
          echo "✅ Edge Functions deployed successfully"
          echo "Project: $SUPABASE_PROJECT_REF"

  # 4. Database Migrations (on schema changes)
  db-migrate:
    name: Database Migrations
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase Project
        run: supabase link --project-ref $SUPABASE_PROJECT_REF

      - name: Push Database Changes
        run: supabase db push
